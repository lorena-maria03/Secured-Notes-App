<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secured Notes App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a1a; }
        p.subtitle { color: #666; margin-bottom: 32px; font-size: 14px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab { flex: 1; padding: 10px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .tab.active { background: #4F46E5; color: white; border-color: #4F46E5; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        input:focus { border-color: #4F46E5; }
        button.primary { width: 100%; padding: 12px; background: #4F46E5; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 8px; }
        button.primary:hover { background: #4338CA; }
        .message { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
        .message.error { background: #FEE2E2; color: #991B1B; display: block; }
        .message.success { background: #D1FAE5; color: #065F46; display: block; }
        .otp-section { display: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>Secured Notes</h1>
    <p class="subtitle">End-to-end encrypted notes</p>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('login', event)">Login</button>
        <button class="tab" onclick="switchTab('register', event)">Register</button>
    </div>

    <div id="login-form">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="email@example.com" autocomplete="off"/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="new-password"/>
        </div>
        <button class="primary" onclick="this.blur(); login()">Login</button>
    </div>

    <div class="otp-section" id="otp-form">
        <div class="form-group">
            <label>Verification code (check your email)</label>
            <input type="text" id="otp-code" placeholder="123456" maxlength="6"/>
        </div>
        <button class="primary" onclick="this.blur(); verify2fa()">Verify code</button>
    </div>

    <div id="register-form" style="display:none;">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="reg-username" placeholder="username"/>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="email@example.com"/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="••••••••"/>
            <p style="font-size:11px; color:#999; margin-top:4px;">Min. 8 characters, one uppercase, one lowercase, one number</p>
        </div>
        <button class="primary" onclick="this.blur(); register()">Create account</button>
    </div>

    <div id="message" class="message"></div>
</div>

<script>
    const API = "http://127.0.0.1:8000";
    let pendingEmail = "";

    window.addEventListener('load', () => {
        document.getElementById('login-email').value = '';
        document.getElementById('login-password').value = '';
    });

    function switchTab(tab, event) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('otp-form').style.display = 'none';
        hideMessage();
    }

    function showMessage(text, type) {
        const el = document.getElementById('message');
        el.textContent = text;
        el.className = 'message ' + type;
    }

    function hideMessage() {
        document.getElementById('message').className = 'message';
    }

    async function register() {
    const username = document.getElementById('reg-username').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;

    if (!username || !email || !password) {
        showMessage('Please fill in all fields', 'error');
        return;
    }

    try {
        const res = await fetch(`${API}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (res.ok) {
            showMessage('Account created! You can now log in.', 'success');
        } else {
            if (Array.isArray(data.detail)) {
                const msg = data.detail
                    .map(e => e.msg.replace('Value error, ', ''))
                    .join(' • ');
                showMessage(msg, 'error');
            } else {
                showMessage(data.detail || 'Registration error', 'error');
            }
        }
    } catch (e) {
        showMessage('Connection error', 'error');
    }
}

    async function login() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
        showMessage('Please fill in all fields', 'error');
        return;
    }

    try {
        const res = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok && data.requires_2fa) {
            pendingEmail = data.email;
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('otp-form').style.display = 'block';
            showMessage('Verification code sent to your email!', 'success');
        } else {
            if (Array.isArray(data.detail)) {
                const msg = data.detail
                    .map(e => e.msg.replace('Value error, ', '').replace('value is not a valid email address: ', ''))
                    .join(' • ');
                showMessage(msg, 'error');
            } else {
                showMessage(data.detail || 'Login error', 'error');
            }
        }
    } catch (e) {
        showMessage('Connection error', 'error');
    }
}

    async function verify2fa() {
        const code = document.getElementById('otp-code').value;

        try {
            const res = await fetch(`${API}/auth/verify-2fa`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: pendingEmail, code })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('token', data.access_token);
                window.location.href = 'notes.html';
            } else {
                showMessage(data.detail || 'Invalid code', 'error');
            }
        } catch (e) {
            showMessage('Connection error', 'error');
        }
    }
</script>
</body>
</html>
